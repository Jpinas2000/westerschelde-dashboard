<!DOCTYPE html>

<html lang="nl">

<head>

<meta charset="utf-8">

<title>{{ title }}</title>

<link rel="stylesheet"

href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<h1>{{ title }}</h1>

<div class="grid">

<div class="card">

<h2>Temperatuur</h2>

<p>{{ weather.temperature }} °C</p>

</div>

<div class="card">

<h2>Wind</h2>

<p>{{ weather.wind }} km/u</p>

<p>Richting: {{ weather.direction }}°</p>

</div>
<div class="card">

    <h2>🌊 Water Vlissingen</h2>

    <p><strong>Waterstand:</strong> {{ water.waterlevel }}</p>

    <p><strong>Hoogwater:</strong> {{ water.high }}</p>

    <p><strong>Laagwater:</strong> {{ water.low }}</p>

    <p><strong>Laatste update:</strong> {{ water.update }}</p>

</div>

</div>

<script src="{{ url_for('static',filename='js/dashboard.js') }}"></script>

</body>

</html>
